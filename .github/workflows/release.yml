name: 🚀 发版构建

on:
  repository_dispatch:
    types:
      - release-build
  workflow_dispatch:
    inputs:
      tag:
        description: 源码 Release 标签；留空则检查最新 tag
        required: false
        type: string
      force_rebuild:
        description: 忽略已有完成标记并重新构建指定 tag
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '*/30 * * * *'

env:
  APP_NAME: SakuraBot
  PRIVATE_REPOSITORY: Lovely-02/SakuraBot
  RELEASE_DIR: SakuraBot-release

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  check-private-tag:
    name: 🔎 检查源码 tag
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: 🔎 检查最新 tag 和发布 Release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          MANUAL_TAG: ${{ inputs.tag }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
          PUBLIC_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::缺少 GH_TOKEN。请在发布仓库 Secrets 中配置具备源码读取和 Release 写入权限的 token。"
            exit 1
          fi

          if [ -n "$DISPATCH_TAG" ]; then
            tag="$DISPATCH_TAG"
          elif [ -n "$MANUAL_TAG" ]; then
            tag="$MANUAL_TAG"
          else
            tag="$(gh api repos/${{ env.PRIVATE_REPOSITORY }}/tags --jq '.[0].name // empty')"
          fi

          if [ -z "$tag" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "未发现源码 tag，跳过构建。"
            exit 0
          fi

          if ! gh api repos/${{ env.PRIVATE_REPOSITORY }}/git/ref/tags/$tag >/dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "源码 tag 不存在：$tag"
            exit 0
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          release_json="$(gh api repos/$PUBLIC_REPOSITORY/releases/tags/$tag 2>/dev/null || true)"
          build_complete="$(printf '%s' "$release_json" | jq -r '.assets[]?.name | select(. == "SakuraBot-build-complete.txt")' 2>/dev/null || true)"
          build_complete_asset_id="$(printf '%s' "$release_json" | jq -r '.assets[]? | select(.name == "SakuraBot-build-complete.txt") | .id' 2>/dev/null || true)"

          if [ "$FORCE_REBUILD" = "true" ] && [ -n "$build_complete_asset_id" ]; then
            gh api --method DELETE "repos/$PUBLIC_REPOSITORY/releases/assets/$build_complete_asset_id"
            build_complete=""
            echo "已删除旧的构建完成标记，准备强制重建：$tag"
          fi

          if [ -n "$build_complete" ] && [ "$FORCE_REBUILD" != "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "发布 Release $tag 已有构建完成标记，跳过构建。"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            if [ -n "$build_complete" ]; then
              echo "强制重新构建已有完成标记的 tag：$tag"
            else
              echo "发现需要构建的 tag：$tag"
            fi
          fi

  backend:
    name: 🛠️ 后端构建 (${{ matrix.target }})
    needs: check-private-tag
    if: ${{ needs.check-private-tag.outputs.should_build == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            ext: .exe
          - runner: macos-latest
            target: x86_64-apple-darwin
            ext: ''
          - runner: macos-latest
            target: aarch64-apple-darwin
            ext: ''
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: ''
    steps:
      - name: 📂 检出源码仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPOSITORY }}
          ref: ${{ needs.check-private-tag.outputs.tag }}
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: ✅ 校验源码
        run: |
          test -f Cargo.toml
          test -f client/package.json
          test -f client/src-tauri/Cargo.toml
          test -f client/src-tauri/src/lib.rs
          test -f client/src-tauri/icons/icon.png
          test -f client/src-tauri/icons/icon.ico

      - name: ⚙️ 设置 Rust 运行环境
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 💾 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: backend-${{ matrix.target }}

      - name: 🛠️ 构建后端
        run: cargo build --release --bin ${{ env.APP_NAME }} --target ${{ matrix.target }}

      - name: 📦 整理后端构建产物
        run: |
          mkdir -p "${{ env.RELEASE_DIR }}/backend/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ env.APP_NAME }}${{ matrix.ext }}" "${{ env.RELEASE_DIR }}/backend/${{ matrix.target }}/"
          cp README.md "${{ env.RELEASE_DIR }}/backend/${{ matrix.target }}/"
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md "${{ env.RELEASE_DIR }}/backend/${{ matrix.target }}/"
          fi

      - name: 🗜️ 打包后端构建产物
        run: tar -czf "${{ env.RELEASE_DIR }}/${{ env.APP_NAME }}-backend-${{ matrix.target }}.tar.gz" -C "${{ env.RELEASE_DIR }}/backend/${{ matrix.target }}" .

      - name: ⬆️ 上传后端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-backend-${{ matrix.target }}
          path: ${{ env.RELEASE_DIR }}/${{ env.APP_NAME }}-backend-${{ matrix.target }}.tar.gz

  frontend-desktop:
    name: 🖥️ 前端桌面端构建 (${{ matrix.target }})
    needs: check-private-tag
    if: ${{ needs.check-private-tag.outputs.should_build == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: msi,nsis
          - runner: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
          - runner: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: appimage,deb,rpm
    steps:
      - name: 📂 检出源码仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPOSITORY }}
          ref: ${{ needs.check-private-tag.outputs.tag }}
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: ✅ 校验源码
        run: |
          test -f Cargo.toml
          test -f client/package.json
          test -f client/src-tauri/Cargo.toml
          test -f client/src-tauri/src/lib.rs
          test -f client/src-tauri/icons/icon.png
          test -f client/src-tauri/icons/icon.ico

      - name: 📦 配置 PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: ⚙️ 设置 Node.js 运行环境
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: 🧩 安装 Linux Tauri 构建依赖
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: ⚙️ 设置 Rust 运行环境
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 💾 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
          key: frontend-desktop-${{ matrix.target }}

      - name: 📦 安装前端依赖
        run: pnpm --dir client install --frozen-lockfile

      - name: 🖥️ 构建桌面端前端
        uses: tauri-apps/tauri-action@v0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          projectPath: client
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --ci

      - name: 📦 整理桌面端构建产物
        run: |
          mkdir -p "${{ env.RELEASE_DIR }}/frontend-desktop/${{ matrix.target }}"
          find client/src-tauri/target/${{ matrix.target }}/release/bundle -type f \
            \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) \
            -exec cp {} "${{ env.RELEASE_DIR }}/frontend-desktop/${{ matrix.target }}/" \;
          test -n "$(find "${{ env.RELEASE_DIR }}/frontend-desktop/${{ matrix.target }}" -type f -print -quit)"

      - name: ⬆️ 上传桌面端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-frontend-desktop-${{ matrix.target }}
          path: ${{ env.RELEASE_DIR }}/frontend-desktop/${{ matrix.target }}/*
          if-no-files-found: error

  frontend-ios:
    name: 📱 前端 iOS 无签名构建
    needs: check-private-tag
    if: ${{ needs.check-private-tag.outputs.should_build == 'true' }}
    runs-on: macos-latest
    steps:
      - name: 📂 检出源码仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPOSITORY }}
          ref: ${{ needs.check-private-tag.outputs.tag }}
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: ✅ 校验源码
        run: |
          test -f client/package.json
          test -f client/pnpm-lock.yaml
          test -f client/src-tauri/Cargo.toml
          test -f client/src-tauri/src/lib.rs
          test -f client/src-tauri/Info.ios.plist
          test -f client/src-tauri/icons/ios/AppIcon-512@2x.png

      - name: 📦 配置 PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: ⚙️ 设置 Node.js 运行环境
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: ⚙️ 设置 Rust 运行环境
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: 💾 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri
          key: frontend-ios-aarch64-apple-ios

      - name: 📦 安装前端依赖
        run: pnpm --dir client install --frozen-lockfile

      - name: 🍎 初始化 iOS 工程
        working-directory: client
        run: pnpm tauri ios init --ci --skip-targets-install

      - name: 🌸 写入自定义应用图标
        working-directory: client
        run: pnpm icons

      - name: 📱 构建无签名 iOS IPA
        working-directory: client
        run: pnpm tauri ios build --no-sign

      - name: 📦 整理 iOS 构建产物
        run: |
          ipa_path="$(find client/src-tauri/gen/apple/build/arm64 -maxdepth 1 -type f -name "*.ipa" -print -quit)"
          test -n "$ipa_path"
          mkdir -p "${{ env.RELEASE_DIR }}/frontend-ios"
          cp "$ipa_path" "${{ env.RELEASE_DIR }}/frontend-ios/${{ env.APP_NAME }}-frontend-ios-unsigned.ipa"
          unzip -t "${{ env.RELEASE_DIR }}/frontend-ios/${{ env.APP_NAME }}-frontend-ios-unsigned.ipa"

      - name: ⬆️ 上传 iOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-frontend-ios-unsigned
          path: ${{ env.RELEASE_DIR }}/frontend-ios/${{ env.APP_NAME }}-frontend-ios-unsigned.ipa
          if-no-files-found: error

  publish:
    name: 🚀 上传 Release 产物
    needs:
      - check-private-tag
      - backend
      - frontend-desktop
      - frontend-ios
    if: ${{ always() && needs.check-private-tag.outputs.should_build == 'true' && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: 💾 下载全部构建产物
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: ${{ env.RELEASE_DIR }}
          merge-multiple: true

      - name: 🧾 汇总构建状态
        id: build-result
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          DESKTOP_RESULT: ${{ needs.frontend-desktop.result }}
          IOS_RESULT: ${{ needs.frontend-ios.result }}
        run: |
          set -euo pipefail
          mkdir -p "${{ env.RELEASE_DIR }}"

          if find "${{ env.RELEASE_DIR }}" -type f -print -quit | grep -q .; then
            has_artifacts=true
          else
            has_artifacts=false
          fi

          if [ "$BACKEND_RESULT" = "success" ] && [ "$DESKTOP_RESULT" = "success" ] && [ "$IOS_RESULT" = "success" ] && [ "$has_artifacts" = "true" ]; then
            status="全部平台构建成功"
            printf 'SakuraBot %s build complete\n' "${{ needs.check-private-tag.outputs.tag }}" > "${{ env.RELEASE_DIR }}/SakuraBot-build-complete.txt"
          else
            status="部分平台构建失败；已发布成功产物，后续任务会继续重试"
            rm -f "${{ env.RELEASE_DIR }}/SakuraBot-build-complete.txt"
            echo "::warning::后端=$BACKEND_RESULT，桌面端=$DESKTOP_RESULT，iOS=$IOS_RESULT"
          fi

          echo "has_artifacts=$has_artifacts" >> "$GITHUB_OUTPUT"
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: 🚀 创建或更新 Release
        if: ${{ steps.build-result.outputs.has_artifacts == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-private-tag.outputs.tag }}
          name: ${{ needs.check-private-tag.outputs.tag }}
          make_latest: true
          files: ${{ env.RELEASE_DIR }}/*
          body: |
            ## SakuraBot ${{ needs.check-private-tag.outputs.tag }}

            本 Release 由发布仓库自动构建。

            构建状态：${{ steps.build-result.outputs.status }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
